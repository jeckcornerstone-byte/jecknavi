<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>WebAR Indoor Navigation</title>

<script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
<script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
<script src="app.js"></script>

<style>
body { margin:0; overflow:hidden; font-family:Arial; }
#ui {
  position:absolute;
  top:10px;
  left:10px;
  background:white;
  padding:10px;
  border-radius:10px;
}
</style>
</head>

<body>

<div id="ui">
<b>Select Destination:</b><br>
<select onchange="setDestination(this.value)">
<option value="">--Select--</option>
<option value="ICU">ICU</option>
<option value="ER">Emergency</option>
<option value="LAB">Lab</option>
</select>
</div>

<a-scene embedded arjs>

<a-marker id="entrance" preset="hiro">

  <!-- 🔥 GLOWING ARROW -->
  <a-entity id="arrow" position="0 0.5 0">
    <a-cone 
      color="#00ffcc"
      height="0.8"
      radius-bottom="0.25"
      material="emissive:#00ffcc; emissiveIntensity:2; shader:standard">
    </a-cone>
  </a-entity>

  <a-text id="label" position="0 1.2 0" align="center" color="#00ffff"></a-text>

</a-marker>

<a-entity camera></a-entity>

</a-scene>

</body>
</html>
