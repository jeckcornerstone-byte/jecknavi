<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hospital WebAR Navigation</title>
  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  <script src="app.js"></script>
  <style>
    body { margin: 0; overflow: hidden; font-family: Arial; }
    #ui {
      position: absolute;
      top: 10px;
      left: 10px;
      background: white;
      padding: 10px;
      border-radius: 10px;
      z-index: 10;
    }
  </style>
</head>

<body>

<div id="ui">
  <b>Select Destination:</b><br>
  <select id="destination" onchange="setDestination(this.value)">
    <option value="">--Select--</option>
    <option value="ER">Emergency Room</option>
    <option value="ICU">ICU</option>
    <option value="LAB">Laboratory</option>
  </select>
</div>

<!DOCTYPE html>
<html>
<head>
  <meta charset="utf-8">
  <title>Hospital AR Navigation</title>

  <script src="https://aframe.io/releases/1.4.0/aframe.min.js"></script>
  <script src="https://cdn.jsdelivr.net/gh/AR-js-org/AR.js/aframe/build/aframe-ar.js"></script>
  <script src="app.js"></script>

  <style>
    body { margin:0; overflow:hidden; font-family:Arial; }
    #ui {
      position:absolute;
      top:10px;
      left:10px;
      background:white;
      padding:10px;
      border-radius:10px;
      z-index:10;
    }
  </style>
</head>

<body>

<div id="ui">
  <b>Select Destination:</b><br>
  <select onchange="setDestination(this.value)">
    <option value="">--Select--</option>
    <option value="ICU">ICU</option>
    <option value="ER">Emergency Room</option>
    <option value="LAB">Laboratory</option>
  </select>
</div>

<a-scene embedded arjs>

  <!-- MAIN START MARKER -->
  <a-marker id="entrance" preset="hiro">
    <a-entity id="arrow" position="0 0.5 0"></a-entity>
    <a-text id="label" position="0 1 0" align="center"></a-text>
  </a-marker>

  <!-- OTHER MARKERS -->
  <a-marker id="hallway" type="pattern" url="markers/hallway.patt"></a-marker>
  <a-marker id="ICU" type="pattern" url="markers/ICU.patt"></a-marker>
  <a-marker id="ER" type="pattern" url="markers/ER.patt"></a-marker>
  <a-marker id="LAB" type="pattern" url="markers/LAB.patt"></a-marker>

  <a-entity camera></a-entity>

</a-scene>


</body>
</html>
